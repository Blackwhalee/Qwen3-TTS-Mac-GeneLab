name: YujieTTS
options:
  bundleIdPrefix: com.blackwhale
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    PRODUCT_NAME: "黑鲸自定义克隆TTS"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"

targets:
  YujieTTS:
    type: application
    platform: macOS
    sources:
      - path: YujieTTS
        excludes:
          - "Resources/python-engine/**"
    resources:
      - path: YujieTTS/Resources/default-voices
        buildPhase: resources
      # 上架前运行 prepare_bootstrap_resources.sh 填入 .tar.gz；optional 避免未复制时工程无法生成
      - path: YujieTTS/Resources/bootstrap
        buildPhase: resources
        optional: true
    settings:
      base:
        INFOPLIST_FILE: YujieTTS/Info.plist
        CODE_SIGN_ENTITLEMENTS: YujieTTS/YujieTTS.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: YujieTTS/Info.plist
    dependencies: []
